service: sleep-type

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  stage: ${opt:stage, 'prod'}
  region: ${opt:region, 'ap-northeast-2'}
  memorySize: 256
  timeout: 30
  apiGateway:
    throttling:
      burstLimit: 100
      rateLimit: 50
    binaryMediaTypes:
      - 'multipart/form-data'
      - 'application/octet-stream'
  environment:
    DB_HOST: ${env:DB_HOST}
    DB_NAME: ${env:DB_NAME, 'sleepquiz'}
    DB_USER: ${env:DB_USER}
    DB_PASSWORD: ${env:DB_PASSWORD}
    DB_PORT: ${env:DB_PORT, '5432'}
    ALLOWED_ORIGIN: ${env:ALLOWED_ORIGIN, 'https://sleeptypequiz.com'}
  vpc:
    securityGroupIds:
      - ${env:VPC_SECURITY_GROUP_ID}
    subnetIds:
      - ${env:VPC_SUBNET_ID_1}
      - ${env:VPC_SUBNET_ID_2}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: 'arn:aws:logs:*:*:*'
        - Effect: Allow
          Action:
            - ec2:CreateNetworkInterface
            - ec2:DescribeNetworkInterfaces
            - ec2:DeleteNetworkInterface
          Resource: '*'

functions:
  sleepTypeSubmit:
    handler: handler.sleep_type_submit
    description: 'Sleep Type Quiz - Submit answers and calculate chronotype'
    events:
      - http:
          path: /api/submit
          method: post
          cors:
            origin: ${env:ALLOWED_ORIGIN, 'https://sleeptypequiz.com'}
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: false

  sleepTypeStats:
    handler: handler.sleep_type_stats
    description: 'Sleep Type Quiz - Get type distribution statistics'
    events:
      - http:
          path: /api/stats
          method: get
          cors:
            origin: ${env:ALLOWED_ORIGIN, 'https://sleeptypequiz.com'}
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: false

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: false
    slim: true
    strip: false
